name: Deploy API

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          CORS_ORIGINS: '["http://localhost"]'
          GOOGLE_MAPS_API_KEY: placeholder
        run: pytest tests -v

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🧪Tests failed!
          Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy:
      runs-on: ubuntu-latest
      needs: test

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Authenticate to GCP
          uses: google-github-actions/auth@v2
          with:
            credentials_json: ${{ secrets.GCP_SA_KEY }}

        - name: Setup gcloud
          uses: google-github-actions/setup-gcloud@v2
          with:
            project_id: ${{ secrets.GCP_PROJECT_ID }}

        - name: Configure Docker auth
          run: |
            gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

        - name: Build image
          run: |
            docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cafeina/api:latest .

        - name: Push image
          run: |
            docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cafeina/api:latest

        - name: Deploy to Cloud Run
          run: |
            gcloud run deploy cafeina-api \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cafeina/api:latest \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --set-secrets SECRET_KEY=SECRET_KEY:latest \
            --set-secrets ALGORITHM=ALGORITHM:latest \
            --set-secrets ACCESS_TOKEN_EXPIRE_MINUTES=ACCESS_TOKEN_EXPIRE_MINUTES:latest \
            --set-secrets REFRESH_TOKEN_EXPIRE_DAYS=REFRESH_TOKEN_EXPIRE_DAYS:latest \
            --set-secrets CORS_ORIGINS=CORS_ORIGINS:latest \
            --set-secrets GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest

        - name: Notify Telegram on failure
          if: failure()
          run: |
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -d text="🐋Deployment failed!
            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"